name: Deploy InterviewAce to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: npm install
      
    - name: Install backend dependencies
      run: |
        cd server
        npm install
      
    - name: Build frontend
      run: npm run build
      
    - name: Check EC2 Instance Status
      continue-on-error: true
      run: |
        echo "🔍 Pre-flight connectivity check (non-blocking)..."
        echo "Instance IP: $EC2_HOST"
        echo "Note: Security group allows SSH from 0.0.0.0/0 (anywhere), so your IP doesn't matter for deployment."
        echo ""
        echo "Note: This check may fail even if SSH works. The actual SSH connection will be attempted regardless."
        echo ""
        echo "Testing connectivity to port 22..."
        if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/22" 2>/dev/null; then
          echo "✅ Port 22 is reachable from GitHub Actions!"
        else
          echo "⚠️  Port 22 connectivity check failed, but continuing..."
          echo "   This is often a false negative. The SSH connection will still be attempted."
          echo "   If SSH also fails, check:"
          echo "   - Security Group: SSH (port 22) from 0.0.0.0/0"
          echo "   - Network ACLs: VPC → Network ACLs"
          echo "   - Instance is running and healthy"
        fi
    
    - name: Prepare EC2 and clone repository
      continue-on-error: false
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 3600s
        command_timeout: 3600s
        script_stop: true
        debug: true
        fingerprint: ""
        envs: EC2_USERNAME,GITHUB_TOKEN
        script: |
          set -euo pipefail
          
          echo "🚀 Starting automated deployment..."
          echo "Current user: $(whoami)"
          echo "Current directory: $(pwd)"
          echo "Home directory: $HOME"
          echo "Hostname: $(hostname)"
          echo "Uptime: $(uptime)"
          
          # Check disk space first
          echo "💾 Current disk space:"
          df -h / | tail -1
          
          # Check if instance is responsive
          echo "🔍 System status check..."
          echo "Memory usage:"
          free -h || true
          echo "Disk usage details:"
          df -h || true
          
          # Test sudo access
          echo "Testing sudo access..."
          sudo -n true || echo "Warning: sudo may require password"
          
          # Install server prerequisites on fresh EC2 instances
          echo "📦 Checking and installing server prerequisites..."
          PKG_MGR=""
          if command -v dnf >/dev/null 2>&1; then
            PKG_MGR="dnf"
          elif command -v yum >/dev/null 2>&1; then
            PKG_MGR="yum"
          fi
          
          if [ -z "$PKG_MGR" ]; then
            echo "❌ No supported package manager found (dnf/yum)"
            exit 1
          fi
          
          # Amazon Linux 2023 ships curl-minimal; do not install full curl (conflicts)
          PACKAGES=""
          if ! command -v git >/dev/null 2>&1; then
            PACKAGES="$PACKAGES git"
          fi
          if ! command -v nginx >/dev/null 2>&1; then
            PACKAGES="$PACKAGES nginx"
          fi
          
          if [ -n "$PACKAGES" ]; then
            echo "📦 Installing:$PACKAGES"
            sudo $PKG_MGR install -y $PACKAGES
          else
            echo "✅ git and nginx already installed"
          fi
          
          if ! command -v curl >/dev/null 2>&1; then
            echo "❌ curl is required but not available on this instance"
            exit 1
          fi
          
          if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
            echo "📦 Installing Node.js 20..."
            curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
            sudo $PKG_MGR install -y nodejs
          else
            NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
            if [ "$NODE_MAJOR" -lt 20 ]; then
              echo "📦 Upgrading Node.js to version 20..."
              curl -fsSL https://rpm.nodesource.com/setup_20.x | sudo bash -
              sudo $PKG_MGR install -y nodejs
            fi
          fi
          
          if ! command -v pm2 >/dev/null 2>&1; then
            echo "📦 Installing PM2..."
            sudo npm install -g pm2
          fi
          
          sudo systemctl enable nginx || true
          sudo systemctl start nginx || true
          
          echo "✅ Prerequisites ready:"
          git --version
          node --version
          npm --version
          pm2 --version || true
          nginx -v 2>&1 || true
          
          # Ensure /var/www exists and has correct permissions
          echo "Setting up /var/www directory..."
          sudo mkdir -p /var/www || { echo "Failed to create /var/www"; exit 1; }
          sudo chown "$EC2_USERNAME:$EC2_USERNAME" /var/www || { echo "Failed to chown /var/www"; exit 1; }
          echo "✅ /var/www directory ready"
          
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/Shubham96681/Interview_prep.git"
          
          # Clone or update repository
          echo "Checking if project directory exists..."
          if [ -d /var/www/interview-prep/.git ]; then
            echo "📁 Project directory exists"
            echo "🔄 Pulling latest changes..."
            cd /var/www/interview-prep || { echo "Failed to cd to /var/www/interview-prep"; exit 1; }
            git remote set-url origin "$REPO_URL"
            git fetch origin main || { echo "Failed to fetch from origin"; exit 1; }
            git reset --hard origin/main || { echo "Failed to reset to origin/main"; exit 1; }
            git clean -fd || { echo "Failed to clean untracked files"; exit 1; }
            echo "✅ Repository updated"
          else
            echo "📦 Cloning repository..."
            rm -rf /var/www/interview-prep
            cd /var/www || { echo "Failed to cd to /var/www"; exit 1; }
            git clone "$REPO_URL" interview-prep || { echo "Failed to clone repository"; exit 1; }
            cd interview-prep || { echo "Failed to cd to interview-prep"; exit 1; }
            echo "✅ Repository cloned"
          fi
          
          sudo chown -R "$EC2_USERNAME:$EC2_USERNAME" /var/www/interview-prep
          mkdir -p /var/www/interview-prep/dist
          echo "✅ EC2 prepared for deployment"
      
    - name: Copy frontend build to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        source: "dist"
        target: "/var/www/interview-prep"
        overwrite: true
      
    - name: Deploy application on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 3600s
        command_timeout: 3600s
        script_stop: true
        debug: true
        fingerprint: ""
        envs: EC2_USERNAME,SKIP_FRONTEND_BUILD,NODE_OPTIONS
        script: |
          set -e
          export SKIP_FRONTEND_BUILD=true
          
          cd /var/www/interview-prep
          sudo chown -R "$EC2_USERNAME:$EC2_USERNAME" /var/www/interview-prep
          chmod +x deploy.sh
          
          echo "📦 Running deployment script..."
          if ./deploy.sh; then
            echo "✅ Deployment script completed successfully"
          else
            echo "❌ Deployment script failed"
            exit 1
          fi
      
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 300s
        debug: true
        fingerprint: ""
        script: |
          set -e
          
          echo "🔍 Verifying deployment..."
          
          # Wait for services to start
          sleep 5
          
          # Check PM2 status
          echo "📊 PM2 Status:"
          pm2 status
          
          # Check backend health
          echo "🏥 Checking backend health..."
          for i in {1..5}; do
            if curl -f http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy!"
              curl http://localhost:5000/api/health
              break
            else
              echo "⏳ Waiting for backend... (attempt $i/5)"
              sleep 2
            fi
          done
          
          # Check if frontend files exist
          echo "📁 Checking frontend build..."
          if [ -d /var/www/interview-prep/dist ] && [ -f /var/www/interview-prep/dist/index.html ]; then
            echo "✅ Frontend build exists"
            ls -lh /var/www/interview-prep/dist/
          else
            echo "❌ Frontend build not found!"
            exit 1
          fi
          
          # Check nginx is serving the site
          echo "🌐 Checking nginx..."
          if curl -f http://localhost > /dev/null 2>&1; then
            echo "✅ Nginx is serving the site!"
          else
            echo "⚠️  Nginx might need a reload"
            sudo systemctl reload nginx || true
          fi
          
          echo "✅ Deployment verification complete!"

