name: Deploy InterviewAce to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install frontend dependencies
      run: npm install
      
    - name: Install backend dependencies
      run: |
        cd server
        npm install
      
    - name: Build frontend
      run: npm run build
      
    - name: Check EC2 Instance Status
      continue-on-error: true
      run: |
        echo "🔍 Pre-flight connectivity check (non-blocking)..."
        echo "Instance IP: $EC2_HOST"
        echo "Note: Security group allows SSH from 0.0.0.0/0 (anywhere), so your IP doesn't matter for deployment."
        echo ""
        echo "Note: This check may fail even if SSH works. The actual SSH connection will be attempted regardless."
        echo ""
        echo "Testing connectivity to port 22..."
        if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/22" 2>/dev/null; then
          echo "✅ Port 22 is reachable from GitHub Actions!"
        else
          echo "⚠️  Port 22 connectivity check failed, but continuing..."
          echo "   This is often a false negative. The SSH connection will still be attempted."
          echo "   If SSH also fails, check:"
          echo "   - Security Group: SSH (port 22) from 0.0.0.0/0"
          echo "   - Network ACLs: VPC → Network ACLs"
          echo "   - Instance is running and healthy"
        fi
    
    - name: Deploy to EC2
      continue-on-error: false
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 3600s
        command_timeout: 3600s
        script_stop: true
        debug: true
        fingerprint: ""
        envs: EC2_USERNAME,NODE_OPTIONS
        script: |
          set -e
          
          echo "🚀 Starting automated deployment..."
          echo "Current user: $(whoami)"
          echo "Current directory: $(pwd)"
          echo "Home directory: $HOME"
          echo "Hostname: $(hostname)"
          echo "Uptime: $(uptime)"
          
          # Check disk space first
          echo "💾 Current disk space:"
          df -h / | tail -1
          
          # Check if instance is responsive
          echo "🔍 System status check..."
          echo "Memory usage:"
          free -h || true
          echo "Disk usage details:"
          df -h || true
          
          # Test sudo access
          echo "Testing sudo access..."
          sudo -n true || echo "Warning: sudo may require password"
          
          # Ensure /var/www exists and has correct permissions
          echo "Setting up /var/www directory..."
          sudo mkdir -p /var/www || { echo "Failed to create /var/www"; exit 1; }
          sudo chown "$EC2_USERNAME:$EC2_USERNAME" /var/www || { echo "Failed to chown /var/www"; exit 1; }
          echo "✅ /var/www directory ready"
          
          # Check if git is available
          echo "Checking git availability..."
          git --version || { echo "Git is not installed!"; exit 1; }
          
          # Check if directory exists
          echo "Checking if project directory exists..."
          if [ -d /var/www/interview-prep ]; then
            echo "📁 Project directory exists"
            echo "🔄 Pulling latest changes..."
            cd /var/www/interview-prep || { echo "Failed to cd to /var/www/interview-prep"; exit 1; }
            echo "Current directory after cd: $(pwd)"
            git fetch origin main || { echo "Failed to fetch from origin"; exit 1; }
            git reset --hard origin/main || { echo "Failed to reset to origin/main"; exit 1; }
            git clean -fd || { echo "Failed to clean untracked files"; exit 1; }
            echo "✅ Repository updated"
          else
            echo "📦 Project directory does not exist, cloning repository..."
            cd /var/www || { echo "Failed to cd to /var/www"; exit 1; }
            echo "Current directory: $(pwd)"
            echo "Listing /var/www contents:"
            ls -la /var/www || true
            git clone https://github.com/Shubham96681/Interview_prep.git interview-prep || { echo "Failed to clone repository"; exit 1; }
            cd interview-prep || { echo "Failed to cd to interview-prep"; exit 1; }
            echo "✅ Repository cloned"
          fi
          
          echo "Final directory: $(pwd)"
          echo "Verifying we're in the right place..."
          ls -la || { echo "Failed to list directory contents"; exit 1; }
          
          # Ensure correct ownership
          echo "Setting ownership..."
          sudo chown -R "$EC2_USERNAME:$EC2_USERNAME" /var/www/interview-prep || { echo "Failed to chown project directory"; exit 1; }
          echo "✅ Ownership set"
          
          # Make deploy script executable
          echo "Making deploy.sh executable..."
          chmod +x deploy.sh || { echo "Failed to chmod deploy.sh"; exit 1; }
          echo "✅ deploy.sh is executable"
          
          # Run deployment script with explicit output flushing
          echo "📦 Running deployment script..."
          echo "   (This will take several minutes, output will appear below)"
          
          # Run deploy script directly - it handles its own output
          # The script command can cause exit code issues, so run directly
          if ./deploy.sh; then
              DEPLOY_EXIT_CODE=0
          else
              DEPLOY_EXIT_CODE=$?
          fi
          
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
              echo "❌ Deployment script failed with exit code: $DEPLOY_EXIT_CODE"
              exit 1
          fi
          
          echo "✅ Deployment script completed successfully"
      
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        timeout: 300s
        debug: true
        fingerprint: ""
        script: |
          set -e
          
          echo "🔍 Verifying deployment..."
          
          # Wait for services to start
          sleep 5
          
          # Check PM2 status
          echo "📊 PM2 Status:"
          pm2 status
          
          # Check backend health
          echo "🏥 Checking backend health..."
          for i in {1..5}; do
            if curl -f http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy!"
              curl http://localhost:5000/api/health
              break
            else
              echo "⏳ Waiting for backend... (attempt $i/5)"
              sleep 2
            fi
          done
          
          # Check if frontend files exist
          echo "📁 Checking frontend build..."
          if [ -d /var/www/interview-prep/dist ] && [ -f /var/www/interview-prep/dist/index.html ]; then
            echo "✅ Frontend build exists"
            ls -lh /var/www/interview-prep/dist/
          else
            echo "❌ Frontend build not found!"
            exit 1
          fi
          
          # Check nginx is serving the site
          echo "🌐 Checking nginx..."
          if curl -f http://localhost > /dev/null 2>&1; then
            echo "✅ Nginx is serving the site!"
          else
            echo "⚠️  Nginx might need a reload"
            sudo systemctl reload nginx || true
          fi
          
          echo "✅ Deployment verification complete!"

